<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdVanta | لوحة المالك</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, sans-serif;
        }

        body {
            background: #fcfaff;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 2rem;
            color: #1e1e2f;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: white;
            border-radius: 24px;
            padding: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,107,74,0.1);
        }

        .stat-card h3 {
            color: #6b7280;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .stat-card .number {
            font-size: 2.5rem;
            font-weight: 700;
            color: #ff6b4a;
        }

        .messages-table {
            background: white;
            border-radius: 24px;
            padding: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,107,74,0.1);
        }

        .messages-table h2 {
            margin-bottom: 1.5rem;
            color: #1e1e2f;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: right;
            padding: 1rem;
            background: #f8faff;
            color: #2d3142;
            font-weight: 600;
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid #edf2f7;
            color: #4a4e62;
        }

        .delete-btn {
            background: #fee2e2;
            color: #ef4444;
            border: none;
            padding: 0.3rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .delete-btn:hover {
            background: #ef4444;
            color: white;
        }

        .back-link {
            display: inline-block;
            margin-top: 2rem;
            color: #6b7280;
            text-decoration: none;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: #9ca3af;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👤 لوحة تحكم المالك</h1>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>إجمالي الرسائل</h3>
                <div class="number" id="totalMessages">-</div>
            </div>
        </div>

        <div class="messages-table">
            <h2>📋 رسائل المستخدمين</h2>
            <div id="messagesLoading" class="loading">جاري تحميل الرسائل...</div>
            <table id="messagesTable" style="display: none;">
                <thead>
                    <tr>
                        <th>التاريخ</th>
                        <th>الرسالة</th>
                        <th>الإجراء</th>
                    </tr>
                </thead>
                <tbody id="messagesBody"></tbody>
            </table>
        </div>

        <a href="index.html" class="back-link">← العودة إلى الموقع</a>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js';

        const supabaseUrl = 'https://exzshjratpxhpppyosi.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV4enNoanJhdHB4aHBwcHB5b3NpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA4MTkxMTksImV4cCI6MjA4NjM5NTExOX0.CALveHBYa1jbFpi-1XoPF37xnYJwflcf_6ZnF_tpVVw';  
        const supabase = createClient(supabaseUrl, supabaseKey);

        async function loadMessages() {
            const loading = document.getElementById('messagesLoading');
            const table = document.getElementById('messagesTable');
            const tbody = document.getElementById('messagesBody');
            const totalEl = document.getElementById('totalMessages');

            try {
                const { data, error } = await supabase
                    .from('feedback')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                totalEl.textContent = data.length;
                loading.style.display = 'none';
                table.style.display = 'table';

                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" style="text-align: center;">لا توجد رسائل بعد</td></tr>';
                    return;
                }

                tbody.innerHTML = data.map(msg => `
                    <tr>
                        <td>${new Date(msg.created_at).toLocaleDateString('ar-EG')}</td>
                        <td>${msg.message}</td>
                        <td><button class="delete-btn" onclick="deleteMessage('${msg.id}')">حذف</button></td>
                    </tr>
                `).join('');

            } catch (e) {
                loading.textContent = 'حدث خطأ في تحميل الرسائل';
                console.error(e);
            }
        }

        window.deleteMessage = async function(id) {
            if (!confirm('هل أنت متأكد من حذف هذه الرسالة؟')) return;

            try {
                const { error } = await supabase
                    .from('feedback')
                    .delete()
                    .eq('id', id);

                if (error) throw error;

                loadMessages(); // إعادة تحميل الجدول

            } catch (e) {
                alert('حدث خطأ في الحذف');
                console.error(e);
            }
        };

        loadMessages();
    </script>
</body>
</html>
