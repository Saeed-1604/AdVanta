<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdVanta | لوحة المالك</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background: #fcfaff;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 107, 74, 0.03) 0%, transparent 30%),
                radial-gradient(circle at 90% 70%, rgba(0, 102, 255, 0.03) 0%, transparent 35%);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header h1 {
            font-size: 2.2rem;
            background: linear-gradient(145deg, #0066ff, #ff5e3a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .back-btn {
            background: white;
            color: #2d3142;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            border: 1.5px solid #edf2f7;
            transition: 0.25s;
        }

        .back-btn:hover {
            border-color: #ff6b4a;
            background: #fffaf8;
        }

        .logout-btn {
            background: #fee2e2;
            color: #ef4444;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            border: 1.5px solid #fecaca;
            transition: 0.25s;
            cursor: pointer;
        }

        .logout-btn:hover {
            background: #ef4444;
            color: white;
            border-color: #ef4444;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .stat-card {
            background: white;
            border-radius: 30px;
            padding: 1.8rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            border: 1px solid rgba(255,107,74,0.15);
            transition: transform 0.25s, box-shadow 0.25s;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(255,107,74,0.1);
        }

        .stat-card h3 {
            color: #6b7280;
            font-size: 0.95rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .stat-card .number {
            font-size: 2.8rem;
            font-weight: 800;
            color: #ff6b4a;
        }

        .messages-section {
            background: white;
            border-radius: 40px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.02);
            border: 1px solid rgba(255,107,74,0.1);
            margin-bottom: 2rem;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .section-header h2 {
            font-size: 1.6rem;
            color: #1e1e2f;
            font-weight: 700;
        }

        .refresh-btn {
            background: #f8faff;
            border: 1.5px solid #edf2f7;
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            font-weight: 600;
            color: #2d3142;
            cursor: pointer;
            transition: 0.2s;
        }

        .refresh-btn:hover {
            background: #ff6b4a;
            color: white;
            border-color: #ff6b4a;
        }

        .search-box {
            margin-bottom: 1.5rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            padding: 0.9rem 1.5rem;
            border: 1.5px solid #edf2f7;
            border-radius: 50px;
            font-size: 1rem;
            min-width: 250px;
        }

        .search-input:focus {
            outline: none;
            border-color: #ff6b4a;
            box-shadow: 0 0 0 4px rgba(255,107,74,0.1);
        }

        .filter-select {
            padding: 0.9rem 1.5rem;
            border: 1.5px solid #edf2f7;
            border-radius: 50px;
            font-size: 1rem;
            background: white;
            cursor: pointer;
        }

        .messages-table {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: right;
            padding: 1rem 1rem;
            background: #f8faff;
            color: #2d3142;
            font-weight: 700;
            font-size: 0.9rem;
            border-bottom: 2px solid #edf2f7;
        }

        td {
            padding: 1.2rem 1rem;
            border-bottom: 1px solid #edf2f7;
            color: #4a4e62;
        }

        .message-text {
            max-width: 400px;
            word-wrap: break-word;
        }

        .date-cell {
            white-space: nowrap;
            color: #6b7280;
            font-size: 0.9rem;
        }

        .delete-btn {
            background: #fee2e2;
            color: #ef4444;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: 0.2s;
        }

        .delete-btn:hover {
            background: #ef4444;
            color: white;
        }

        .loading-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #9ca3af;
            font-size: 1.1rem;
        }

        .error-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #ef4444;
            background: #fee2e2;
            border-radius: 30px;
            font-size: 1.1rem;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #9ca3af;
            font-size: 1.1rem;
            background: #f8faff;
            border-radius: 30px;
        }

        .footer {
            margin-top: 2.5rem;
            text-align: center;
            color: #9ca3af;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚙️ لوحة تحكم المالك</h1>
            <div class="header-actions">
                <button class="logout-btn" id="logoutBtn">🚪 تسجيل الخروج</button>
                <a href="index.html" class="back-btn">← العودة إلى الموقع</a>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>إجمالي الرسائل</h3>
                <div class="number" id="totalMessages">-</div>
            </div>
            <div class="stat-card">
                <h3>آخر رسالة</h3>
                <div class="number" id="lastMessageDate">-</div>
            </div>
        </div>

        <div class="messages-section">
            <div class="section-header">
                <h2>📬 رسائل المستخدمين</h2>
                <button class="refresh-btn" onclick="loadMessages()">⟳ تحديث</button>
            </div>

            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" placeholder="🔍 بحث في الرسائل..." onkeyup="filterMessages()">
                <select class="filter-select" id="sortSelect" onchange="filterMessages()">
                    <option value="newest">الأحدث أولاً</option>
                    <option value="oldest">الأقدم أولاً</option>
                </select>
            </div>

            <div id="loading" class="loading-state">⏳ جاري تحميل الرسائل...</div>
            <div id="error" class="error-state" style="display: none;">
                ❌ حدث خطأ في تحميل الرسائل. يرجى المحاولة مرة أخرى.
            </div>
            <div id="messagesContainer" style="display: none;">
                <div class="messages-table">
                    <table>
                        <thead>
                            <tr>
                                <th>اسم المستخدم</th>
                                <th>البريد الإلكتروني</th>
                                <th>التاريخ</th>
                                <th>الرسالة</th>
                                <th>الإجراء</th>
                            </tr>
                        </thead>
                        <tbody id="messagesBody"></tbody>
                    </table>
                </div>
            </div>
            <div id="empty" class="empty-state" style="display: none;">
                📭 لا توجد رسائل بعد
            </div>
        </div>

        <div class="footer">
            AdVanta © 2026 - جميع الحقوق محفوظة
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js';

        const supabaseUrl = 'https://ynebvuwbjlvcunoqyxdt.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InluZWJ2dXdiamx2Y3Vub3F5eGR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEyNzUxNTEsImV4cCI6MjA4Njg1MTE1MX0.lvurDprXQfrx_FOPpeYn_mACaqPutmoVFIlNc-Wgzb4';
        const supabase = createClient(supabaseUrl, supabaseKey);

        let allMessages = [];
        let currentUser = null;

        async function checkAdmin() {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user || user.email !== 'saeedqasrawi773@gmail.com') {
                window.location.href = 'index.html';
            }
            currentUser = user;
        }

        window.loadMessages = async function() {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const messagesContainer = document.getElementById('messagesContainer');
            const empty = document.getElementById('empty');
            const totalEl = document.getElementById('totalMessages');
            const lastMessageDate = document.getElementById('lastMessageDate');

            loading.style.display = 'block';
            error.style.display = 'none';
            messagesContainer.style.display = 'none';
            empty.style.display = 'none';

            try {
                const { data, error: supabaseError } = await supabase
                    .from('feelback')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (supabaseError) throw supabaseError;

                allMessages = data || [];

                totalEl.textContent = allMessages.length;
                if (allMessages.length > 0) {
                    const lastDate = new Date(allMessages[0].created_at);
                    lastMessageDate.textContent = lastDate.toLocaleDateString('ar-EG');
                } else {
                    lastMessageDate.textContent = '-';
                }

                loading.style.display = 'none';

                if (allMessages.length === 0) {
                    empty.style.display = 'block';
                    return;
                }

                messagesContainer.style.display = 'block';
                displayMessages(allMessages);

            } catch (e) {
                console.error('خطأ:', e);
                loading.style.display = 'none';
                error.style.display = 'block';
                totalEl.textContent = '0';
                lastMessageDate.textContent = '-';
            }
        };

        function displayMessages(messages) {
            const tbody = document.getElementById('messagesBody');
            
            tbody.innerHTML = messages.map(msg => {
                let dateStr = 'تاريخ غير معروف';
                try {
                    const date = new Date(msg.created_at);
                    dateStr = date.toLocaleDateString('ar-EG', {
                        year: 'numeric',
                        month: 'short',
                        day: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                } catch (e) {}

                return `
                    <tr>
                        <td>${msg.username || 'غير معروف'}</td>
                        <td>${msg.user_id ? 'موجود' : 'غير معروف'}</td>
                        <td class="date-cell">${dateStr}</td>
                        <td class="message-text">${msg.message || 'لا يوجد نص'}</td>
                        <td>
                            <button class="delete-btn" onclick="deleteMessage('${msg.id}')">
                                حذف
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        window.filterMessages = function() {
            const searchText = document.getElementById('searchInput').value.toLowerCase();
            const sortOrder = document.getElementById('sortSelect').value;

            let filtered = [...allMessages];

            if (searchText) {
                filtered = filtered.filter(msg => 
                    (msg.message || '').toLowerCase().includes(searchText) ||
                    (msg.username || '').toLowerCase().includes(searchText)
                );
            }

            if (sortOrder === 'oldest') {
                filtered.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
            } else {
                filtered.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            }

            displayMessages(filtered);
        };

        window.deleteMessage = async function(id) {
            if (!confirm('هل أنت متأكد من حذف هذه الرسالة؟')) return;

            try {
                const { error } = await supabase
                    .from('feelback')
                    .delete()
                    .eq('id', id);

                if (error) throw error;

                loadMessages();

            } catch (e) {
                alert('حدث خطأ في الحذف: ' + e.message);
                console.error(e);
            }
        };

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await supabase.auth.signOut();
            window.location.href = 'index.html';
        });

        await checkAdmin();
        loadMessages();
    </script>
</body>
</html>
